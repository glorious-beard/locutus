# Per-provider tier table. Each tier (fast / balanced / strong) baked
# into a deployment-tunable model + operational knobs. Agents declare
# routing intent via per-agent frontmatter `models:` priority lists
# (e.g. `[{provider: anthropic, tier: balanced}, {provider: googleai,
# tier: strong}]`); the executor walks the list at dispatch time and
# resolves the first preference whose provider is configured against
# this table.
#
# This file is embedded in the locutus binary; `locutus update`
# refreshes it when SDKs pull in new model names. Override per-project
# by editing `.borg/models.yaml`, or globally via
# `LOCUTUS_MODELS_CONFIG=/path/to/file.yaml`.
#
# Knobs:
#   model                — concrete provider-side model string the
#                          adapter passes to its SDK as-is.
#   max_output_tokens    — caps the model's response length. Adapters
#                          substitute a safe minimum when the API
#                          rejects 0 (Anthropic).
#   thinking             — coarse extended-thinking level.
#                          off  = no thinking budget.
#                          on   = ~4k thinking tokens (provider-mapped).
#                          high = ~8k thinking tokens.
#   concurrent_requests  — per-(provider, model) semaphore cap. Bound
#                          fanout-shaped workloads (one elaborator
#                          per outline node) below provider RPM
#                          ceilings without coordination across the
#                          workflow. Zero = unbounded.

providers:
  anthropic:
    fast:
      model: claude-haiku-4-5-20251001
      max_output_tokens: 8192
      thinking: off
      concurrent_requests: 5
    balanced:
      model: claude-sonnet-4-6
      max_output_tokens: 16384
      thinking: on
      concurrent_requests: 4
    strong:
      model: claude-opus-4-7
      max_output_tokens: 32768
      thinking: high
      concurrent_requests: 3

  googleai:
    fast:
      model: gemini-2.5-flash-lite
      max_output_tokens: 16384
      thinking: off
      concurrent_requests: 4
    balanced:
      model: gemini-2.5-flash
      max_output_tokens: 32768
      thinking: on
      concurrent_requests: 4
    strong:
      model: gemini-2.5-pro
      max_output_tokens: 65536
      thinking: high
      concurrent_requests: 2

  openai:
    fast:
      model: gpt-5-mini
      max_output_tokens: 8192
      thinking: off
      concurrent_requests: 5
    balanced:
      model: gpt-5
      max_output_tokens: 16384
      thinking: on
      concurrent_requests: 4
    strong:
      model: o3-pro
      max_output_tokens: 32768
      thinking: high
      concurrent_requests: 3
