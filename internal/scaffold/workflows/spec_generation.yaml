# Spec-generation council workflow. Driven by `locutus refine goals`
# and `locutus import <doc>` (post-admission planning pass).
#
# DJ-098 unified per-cluster revise. Critic findings route through:
#
#   1. survey      — senior-engineer scout brief.
#   2. outline     — feature/strategy titles + summaries.
#   3. elaborate_features  — fanout: one elaborator per outlined feature.
#   4. elaborate_strategies — fanout: one elaborator per outlined strategy.
#   5. reconcile   — clusters inline decisions across the assembled
#                    proposal; emits canonical SpecProposal.
#   6. critique    — four LLM critics + the in-workflow integrity
#                    critic, parallel.
#   7. cluster_findings — LLM clusterer groups any critic findings the
#                    mechanical pre-pass couldn't id-match. Conditional
#                    on has_unmatched_findings.
#   8. revise      — fanout (one call per FindingCluster). Each cluster
#                    carries its own agent_id (set by the mechanical
#                    pre-pass from id prefix or by the LLM clusterer's
#                    kind). Conditional on has_finding_clusters.
#   9. reconcile_revise — same reconciler against the merged raw
#                    proposal (original + revised + added). Conditional
#                    on has_finding_clusters (skipped when nothing
#                    needed revising).
#
# The mechanical pre-pass that populates state.FindingClusters from
# state.Concerns runs in mergeResults after each critique merge — no
# explicit step. It groups findings that name an existing node id;
# the LLM clusterer step processes the rest.
#
# max_rounds=1 because there is no convergence agent in this workflow.
#
# Per-model concurrency caps live in models.yaml's `concurrent_requests`
# field. Even with `parallel: true` on fanout steps, the actual
# concurrency is bounded so fanout never floods a model past its
# configured slot count.
rounds:
  - id: survey
    agent: spec_scout
    parallel: false
    merge_as: scout_brief
  - id: outline
    agent: spec_outliner
    parallel: false
    depends_on: [survey]
    merge_as: outline
  - id: elaborate_features
    agent: spec_feature_elaborator
    parallel: true
    fanout: outline.features
    depends_on: [outline]
    merge_as: elaborated_features
  - id: elaborate_strategies
    agent: spec_strategy_elaborator
    parallel: true
    fanout: outline.strategies
    depends_on: [outline]
    merge_as: elaborated_strategies
  - id: reconcile
    agent: spec_reconciler
    parallel: false
    depends_on: [elaborate_features, elaborate_strategies]
    merge_as: reconciled_proposal
  - id: critique
    agents: [architect_critic, devops_critic, sre_critic, cost_critic]
    parallel: true
    depends_on: [reconcile]
    merge_as: critic_issues
  - id: cluster_findings
    agent: spec_finding_clusterer
    parallel: false
    depends_on: [critique]
    conditional: has_unmatched_findings
    merge_as: finding_clusters
  - id: revise
    # Step-level agent is the fallback when a cluster doesn't carry its
    # own agent_id (shouldn't happen — both the mechanical pre-pass and
    # the LLM-cluster promotion always set one — but keeping this as a
    # safety net for robustness).
    agent: spec_strategy_elaborator
    parallel: true
    fanout: findings.clusters
    depends_on: [cluster_findings]
    conditional: has_finding_clusters
    merge_as: revised_nodes
  - id: reconcile_revise
    agent: spec_reconciler
    parallel: false
    depends_on: [revise]
    conditional: has_finding_clusters
    merge_as: reconciled_proposal
max_rounds: 1
