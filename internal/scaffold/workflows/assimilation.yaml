rounds:
  - id: scan
    agent: scout
    parallel: false
  - id: analyze
    agents: [backend_analyzer, frontend_analyzer, infra_analyzer]
    parallel: true
    depends_on: [scan]
  - id: gaps
    agent: gap_analyst
    parallel: false
    depends_on: [analyze]
# Remediation runs OUTSIDE the workflow per Round 5 / DJ-045: cmd/assimilate.go
# invokes internal/remediate after Analyze returns, applying consolidation +
# attachment rules that the workflow's blind JSON merge cannot honor.
max_rounds: 1
